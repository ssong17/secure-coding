{% extends "base.html" %}
{% block title %}프로필{% endblock %}
{% block content %}
<h2>프로필 관리</h2>
<p>아이디: {{ user.id }}</p>
<form method="post">
  사용자이름: <input type="text" name="username" value="{{ user.username }}" required><br>
  소개글: <br>
  <textarea name="bio" rows="4" cols="50">{{ user.bio or '' }}</textarea><br>
  <button type="submit">프로필 업데이트</button>
</form>
{% endblock %}
