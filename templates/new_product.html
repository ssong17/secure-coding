{% extends "base.html" %}
{% block title %}새 상품 등록{% endblock %}
{% block content %}
<h2>상품 등록</h2>
<form method="post" enctype="multipart/form-data">
  제목: <input type="text" name="title" required><br>
  설명: <br>
  <textarea name="description" rows="4" cols="50" required></textarea><br>
  가격: <input type="text" name="price" required><br>
  사진: <input type="file" name="image" accept="image/png,image/jpeg,image/gif,image/webp"><br>
  <button type="submit">등록하기</button>
</form>
{% endblock %}
