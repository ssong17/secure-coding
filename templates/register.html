{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block content %}
<h2>회원가입</h2>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  아이디: <input type="text" name="id" pattern="[A-Za-z0-9_]{3,20}" title="영문, 숫자, 밑줄(_) 3~20자" required><br>
  사용자이름: <input type="text" name="username" maxlength="20" required><br>
  비밀번호: <input type="password" name="password" minlength="8" required><br>
  <button type="submit">회원가입</button>
</form>
{% endblock %}
